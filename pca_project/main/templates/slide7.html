{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Anomaly Detection</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: #020617;
            color: white;
            padding: 40px;
        }

        h1 {
            text-align: center;
            color: #ef4444;
            margin-bottom: 30px;
        }

        /* TOP INFO CARDS */
        .top {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 40px;
        }

        .card {
            background: rgba(255,255,255,0.05);
            padding: 15px 25px;
            border-radius: 10px;
            border-left: 4px solid #ef4444;
            font-size: 14px;
        }

        /* GRID */
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            max-width: 1100px;
            margin: auto;
        }

        .box {
            background: rgba(255,255,255,0.05);
            padding: 15px;
            border-radius: 12px;
            text-align: center;
        }

        .img-container {
            height: 300px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
            border-radius: 10px;
        }

        .img-container img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .label {
            margin-top: 10px;
            font-size: 14px;
            color: #fca5a5;
        }

        /* NAV */
        .nav {
            display: flex;
            justify-content: space-between;
            margin-top: 50px;
            max-width: 1100px;
            margin-left: auto;
            margin-right: auto;
        }

        .btn {
            padding: 10px 20px;
            background: #ef4444;
            color: white;
            text-decoration: none;
            border-radius: 6px;
        }
    </style>
</head>

<body>

<h1>Anomaly Detection using Z-Score</h1>

<!-- TOP CARDS -->
<div class="top">
    <div class="card">Z-score detects outliers</div>
    <div class="card">Threshold: Z > 3</div>
    <div class="card">Identifies abnormal behavior</div>
</div>

<!-- IMAGES -->
<div class="grid">

    <div class="box">
        <div class="img-container">
            <img src="{% static 'images/anomaly_table.png' %}">
        </div>
        <div class="label">Anomaly Count Table</div>
    </div>

    <div class="box">
        <div class="img-container">
            <img src="{% static 'images/zscore_plot.png' %}">
        </div>
        <div class="label">Z-Score Distribution</div>
    </div>

</div>

<div class="nav">
    <a href="/slide6/" class="btn">← Back</a>
    <a href="/slide8/" class="btn">Next →</a>
</div>

</body>
</html>
