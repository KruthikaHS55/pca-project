{% load static %}

<!DOCTYPE html>
<html>
<head>
    <title>Login</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            background: black;
        }

        /* 🖼️ BACKGROUND IMAGE */
        .bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url("{% static 'images/bg.jpg' %}") no-repeat center center/cover;
            z-index: -1;
            opacity: 0.8; /* adjust for light/dark */
        }

        /* CENTER CONTENT */
        .container {
            text-align: center;
            color: white;
        }

        /* TITLE */
        .title {
            font-size: 22px;
            margin-bottom: 20px;
            letter-spacing: 1px;
            color: #cccccc;
        }

        /* LOGIN CARD */
        .card {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(15px);
            padding: 35px;
            border-radius: 15px;
            width: 300px;
            border: 1px solid rgba(255,255,255,0.15);
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            border: none;
            outline: none;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #4F46E5;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.3s;
        }

        button:hover {
            background: #3730A3;
        }

        .error {
            color: #ff6b6b;
            margin-bottom: 10px;
        }
    </style>
</head>

<body>

<!-- 🖼️ BACKGROUND -->
<div class="bg"></div>

<div class="container">

    <!-- TITLE -->
    <div class="title">
        LOG ANALYSIS USING PCA
    </div>

    <!-- LOGIN CARD -->
    <div class="card">

        {% if error %}
            <div class="error">{{ error }}</div>
        {% endif %}

        <form method="POST">
            {% csrf_token %}
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Sign In</button>
        </form>

    </div>

</div>

</body>
</html>
