{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Analysis</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: #0b1120;
            color: white;
            padding: 40px;
        }

        h1 {
            text-align: center;
            color: #6366f1;
            margin-bottom: 30px;
        }

        .top {
            max-width: 900px;
            margin: auto;
            margin-bottom: 40px;
        }

        .points {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .point {
            background: rgba(255,255,255,0.05);
            padding: 15px;
            border-radius: 10px;
            border-left: 4px solid #6366f1;
            font-size: 14px;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            max-width: 1100px;
            margin: auto;
        }

        .card {
            background: rgba(255,255,255,0.05);
            padding: 15px;
            border-radius: 12px;
            text-align: center;
        }

        /* 🔥 FIXED IMAGE DISPLAY */
        .img-container {
            width: 100%;
            height: 300px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #020617;
            border-radius: 10px;
            overflow: hidden;
        }

        .img-container img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;   /* ✅ FULL IMAGE VISIBLE */
        }

        .label {
            margin-top: 10px;
            font-size: 14px;
            color: #a5b4fc;
        }

        .nav {
            display: flex;
            justify-content: space-between;
            margin-top: 50px;
            max-width: 1100px;
            margin-left: auto;
            margin-right: auto;
        }

        .btn {
            padding: 10px 20px;
            background: #6366f1;
            color: white;
            text-decoration: none;
            border-radius: 6px;
        }
    </style>
</head>

<body>

<h1>Statistical & Correlation Analysis</h1>

<!-- TOP POINTS -->
<div class="top">
    <div class="points">
        <div class="point">Statistical summary (mean, std)</div>
        <div class="point">Feature relationships identified</div>
        <div class="point">Correlation heatmap used</div>
        <div class="point">Covariance matrix computed</div>
    </div>
</div>

<!-- IMAGES -->
<div class="grid">

    <div class="card">
        <div class="img-container">
            <img src="{% static 'images/heatmap.png' %}">
        </div>
        <div class="label">Correlation Heatmap</div>
    </div>

    <div class="card">
        <div class="img-container">
            <img src="{% static 'images/covariance.png' %}">
        </div>
        <div class="label">Covariance Matrix</div>
    </div>

</div>

<div class="nav">
    <a href="/slide5/" class="btn">← Back</a>
    <a href="/slide7/" class="btn">Next →</a>
</div>

</body>
</html>
