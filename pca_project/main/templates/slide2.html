<!DOCTYPE html>
<html>
<head>
    <title>Problem Statement</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: #0f172a;
            color: white;
            padding: 40px;
        }

        h1 {
            color: #6366f1;
            text-align: center;
        }

        .container {
            max-width: 800px;
            margin: auto;
        }

        ul {
            margin-top: 20px;
        }

        li {
            margin: 10px 0;
        }

        .upload-box {
            margin-top: 40px;
            padding: 30px;
            border: 2px dashed #6366f1;
            text-align: center;
            border-radius: 10px;
        }

        input[type="file"] {
            margin-top: 15px;
        }

        button {
            margin-top: 20px;
            padding: 10px 20px;
            background: #6366f1;
            border: none;
            color: white;
            border-radius: 6px;
            cursor: pointer;
        }

        .next {
            display: block;
            text-align: center;
            margin-top: 40px;
        }

        .next a {
            background: #6366f1;
            padding: 10px 20px;
            color: white;
            text-decoration: none;
            border-radius: 6px;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>Problem Statement</h1>

    <ul>
        <li>Large-scale log data is difficult to analyze manually</li>
        <li>Identifying anomalies is time-consuming</li>
        <li>No integrated platform for visualization + analysis</li>
    </ul>

    <!-- CSV Upload -->
    <div class="upload-box">
        <h3>Upload Log Dataset (CSV)</h3>

        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}
            <input type="file" name="file">
            <br>
            <button type="submit">Upload</button>
        </form>
    </div>

    <div class="next">
        <a href="/slide3/">Next →</a>
    </div>

</div>

</body>
</html>
