<!DOCTYPE html>
<html>
<head>
    <title>Problem Statement</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: #0f172a;
            color: white;
            padding: 40px;
        }

        h1 {
            color: #6366f1;
            text-align: center;
        }

        .container {
            max-width: 800px;
            margin: auto;
        }

        ul {
            margin-top: 20px;
        }

        li {
            margin: 10px 0;
        }

        .upload-box {
            margin-top: 40px;
            padding: 30px;
            border: 2px dashed #6366f1;
            text-align: center;
            border-radius: 10px;
        }

        input[type="file"] {
            margin-top: 15px;
        }

        .btn {
            margin-top: 20px;
            padding: 12px 25px;
            background: #6366f1;
            border: none;
            color: white;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
        }

        .nav-buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 40px;
        }

        .nav-buttons a {
            text-decoration: none;
            background: #6366f1;
            padding: 10px 20px;
            border-radius: 6px;
            color: white;
        }

    </style>
</head>

<body>

<div class="container">

    <h1>Problem Statement</h1>

    <ul>
        <li>Large-scale log data is difficult to analyze manually</li>
        <li>Identifying anomalies is time-consuming</li>
        <li>No integrated platform for visualization + analysis</li>
    </ul>

    <!-- CSV Upload -->
    <div class="upload-box">
        <h3>Upload Log Dataset (CSV)</h3>

        <!-- RUN ANALYSIS -->
        <form action="{% url 'run_pca' %}" method="POST" enctype="multipart/form-data">
            {% csrf_token %}
            <input type="file" name="csv_file" required>
            <br>
            <button class="btn" type="submit">🚀 Run Analysis</button>
        </form>

        <!-- NEXT BUTTON (SEPARATE) -->
        <div style="margin-top:20px;">
            <a href="/slide3/">
                <button class="btn">Next →</button>
            </a>
        </div>
    </div>

    <!-- NAVIGATION -->
    <div class="nav-buttons">
        <a href="/slide1/">⬅ Back</a>
        <a href="/slide3/">Next →</a>
    </div>

</div>

</body>
</html>
