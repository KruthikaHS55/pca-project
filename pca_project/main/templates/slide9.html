{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Visualization</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: #020617;
            color: white;
            padding: 40px;
        }

        h1 {
            text-align: center;
            color: #06b6d4;
            margin-bottom: 30px;
        }

        /* TOP INSIGHTS */
        .insights {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 40px;
        }

        .insight {
            background: rgba(255,255,255,0.05);
            padding: 15px 20px;
            border-radius: 10px;
            border-left: 4px solid #06b6d4;
            font-size: 14px;
        }

        /* GRID */
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 25px;
            max-width: 1200px;
            margin: auto;
        }

        .card {
            background: rgba(255,255,255,0.05);
            padding: 12px;
            border-radius: 12px;
            text-align: center;
            transition: 0.3s;
        }

        .card:hover {
            transform: scale(1.03);
        }

        .img-box {
            height: 220px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
            border-radius: 10px;
        }

        .img-box img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .label {
            margin-top: 10px;
            font-size: 14px;
            color: #67e8f9;
        }

        /* NAV */
        .nav {
            display: flex;
            justify-content: space-between;
            margin-top: 50px;
            max-width: 1200px;
            margin-left: auto;
            margin-right: auto;
        }

        .btn {
            padding: 10px 20px;
            background: #06b6d4;
            color: white;
            text-decoration: none;
            border-radius: 6px;
        }
    </style>
</head>

<body>

<h1>Visualization & Key Insights</h1>

<!-- INSIGHTS -->
<div class="insights">
    <div class="insight">PCA shows class separation</div>
    <div class="insight">Top features identified</div>
    <div class="insight">Sensor relationships analyzed</div>
</div>

<!-- VISUALS -->
<div class="grid">

    <div class="card">
        <div class="img-box">
            <img src="{% static 'images/pca_scatter.png' %}">
        </div>
        <div class="label">PCA Scatter (PC1 vs PC2)</div>
    </div>

    <div class="card">
        <div class="img-box">
            <img src="{% static 'images/feature_heatmap.png' %}">
        </div>
        <div class="label">Feature Contribution</div>
    </div>

    <div class="card">
        <div class="img-box">
            <img src="{% static 'images/sensor_plot.png' %}">
        </div>
        <div class="label">Sensor Interaction</div>
    </div>

</div>

<div class="nav">
    <a href="/slide8/" class="btn">← Back</a>
    <a href="/slide10" class="btn">Finish →</a>
</div>

</body>
</html>
